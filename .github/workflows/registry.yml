name: Build registry

# On every push to main, re-validate and fully reconcile the registry against
# the whole repo: added bots are populated, deleted bots are removed, and empty
# zones' registry.json files are pruned. `build` is a full rebuild (not
# incremental), so any push triggers a complete re-check; no paths filter.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate before publishing
        run: python scripts/registry.py validate
      - name: Build registry
        run: python scripts/registry.py build
      - name: Commit registry if changed
        run: |
          git add -A index.json bots
          if git diff --cached --quiet; then
            echo "Registry already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: regenerate bot registry [skip ci]"
            git push
          fi
